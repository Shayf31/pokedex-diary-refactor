<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokedex</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-[#f6efef] text-slate-900 min-h-screen">
    <!-- Navbar -->
    <header class="bg-[#ececec] border-b-4 border-red-500">
      <nav class="max-w-7xl mx-auto px-6">
        <div class="flex gap-10 h-24 items-center">
          <a
            href="index.html"
            class="text-slate-500 font-semibold text-2xl pb-8 hover:text-red-500 transition"
          >
            Homepage
          </a>
          <a
            href="pokedex.html"
            class="text-red-500 font-semibold text-2xl border-b-4 border-red-500 pb-8"
          >
            Pokedex
          </a>
        </div>
      </nav>
    </header>

    <!-- Main -->
    <main class="max-w-7xl mx-auto px-6 py-14">
      <h1 class="text-5xl font-extrabold mb-8">My Pokedex</h1>

      <section
        id="favoritesContainer"
        class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8"
      >
        <!-- Example saved card -->
        <article class="bg-white rounded-3xl shadow-lg overflow-hidden">
          <div class="bg-slate-100 h-60 flex items-center justify-center">
            <img
              src="https://www.pexels.com/photo/cute-pikachu-plush-toy-on-rock-outdoors-36495537/"
              alt="Pikachu stock image"
              class="w-36 h-36 object-contain"
            />
          </div>

          <div class="p-6">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-2xl font-extrabold">Pikachu</h2>
              <span class="text-slate-400 text-2xl font-semibold">#001</span>
            </div>

            <div class="flex gap-3 mb-5">
              <span
                class="bg-yellow-400 text-slate-900 text-sm font-bold px-4 py-2 rounded-full"
                >electric</span
              >
            </div>

            <div class="grid grid-cols-2 gap-y-3 gap-x-5 text-xl mb-6">
              <p>
                <span class="text-slate-500">Hp:</span>
                <span class="font-bold">35</span>
              </p>
              <p>
                <span class="text-slate-500">Attack:</span>
                <span class="font-bold">55</span>
              </p>
              <p>
                <span class="text-slate-500">Defense:</span>
                <span class="font-bold">40</span>
              </p>
            </div>

            <div class="mb-5">
              <label for="note-25" class="block text-lg font-semibold mb-2"
                >Personal Note</label
              >
              <textarea
                id="note-25"
                rows="4"
                placeholder="Write a note about this Pokemon..."
                class="w-full border border-slate-300 rounded-2xl p-4 text-lg outline-none focus:ring-2 focus:ring-red-400 resize-none"
              ></textarea>
            </div>

            <div class="flex gap-3">
              <button
                class="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold text-xl py-3 rounded-2xl transition"
              >
                Save Note
              </button>
              <button
                class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-900 font-bold text-xl py-3 rounded-2xl transition"
              >
                Remove
              </button>
            </div>
          </div>
        </article>
      </section>
    </main>

    <script src="pokedex.js"></script>
  </body>
</html>
